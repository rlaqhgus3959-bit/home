<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안심동행 신청</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#007aff">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        body { font-family: -apple-system, sans-serif; background: #f5f5f7; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .header { text-align: center; margin-bottom: 25px; }
        label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #424245; }
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #d2d2d7; border-radius: 12px; box-sizing: border-box; background-color: #fafafa; font-size: 16px; }
        .submit-btn { width: 100%; background: #007aff; color: white; border: none; padding: 16px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>🚨 안심동행 신청</h2>
        <p style="color:#86868b; font-size:14px; margin-top:5px;">정전 시 경찰관이 안전하게 동행합니다.</p>
    </div>
    <form id="reservationForm">
        <label>출발지</label>
        <input type="text" id="startLoc" placeholder="예: 정문 경비실 앞" required>
        <label>도착지</label>
        <input type="text" id="endLoc" placeholder="예: 101동 502호" required>
        <label>연락처</label>
        <input type="tel" id="contact" placeholder="010-XXXX-XXXX" required>
        <label>특이사항</label>
        <select id="notes">
            <option value="해당 없음">해당 없음</option>
            <option value="여성 안심 귀가">여성 안심 귀가</option>
            <option value="노약자/어린이 동행">노약자/어린이 동행</option>
            <option value="무거운 짐 있음">무거운 짐 있음</option>
        </select>
        <button type="submit" class="submit-btn">신청하기</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4pyfcbxQu7ggpju9pAn-bJiRMDVKsRrc",
        authDomain: "ansim-doghaeng.firebaseapp.com",
        projectId: "ansim-doghaeng",
        storageBucket: "ansim-doghaeng.firebasestorage.app",
        messagingSenderId: "969921301114",
        appId: "1:969921301114:web:210c4a8978a3b2204f89c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('reservationForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            await addDoc(collection(db, "requests"), {
                startLoc: document.getElementById('startLoc').value,
                endLoc: document.getElementById('endLoc').value,
                contact: document.getElementById('contact').value,
                notes: document.getElementById('notes').value,
                status: "대기",
                createdAt: serverTimestamp()
            });
            alert('정상적으로 접수되었습니다. 출발지에서 잠시만 기다려주세요.');
            e.target.reset();
        } catch (err) { alert('접수 실패: ' + err.message); }
    });
</script>
</body>
</html>
