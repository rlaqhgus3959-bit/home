<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안심동행 서비스 신청</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; margin: 0; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #1c1c1e; margin-bottom: 25px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; color: #8e8e93; margin-bottom: 5px; margin-left: 5px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .submit-btn { width: 100%; background: #007aff; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 17px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .submit-btn:active { background: #0056b3; }
    </style>
</head>
<body>
<div class="container">
    <h2>🚓 안심동행 신청</h2>
    <form id="reservationForm">
        <div class="input-group">
            <label>출발 장소</label>
            <input type="text" id="startLoc" placeholder="예: 단지 정문, 상가 앞" required>
        </div>
        <div class="input-group">
            <label>도착 장소</label>
            <input type="text" id="endLoc" placeholder="예: 101동 공동현관" required>
        </div>
        <div class="input-group">
            <label>연락처</label>
            <input type="tel" id="contact" placeholder="010-0000-0000" required>
        </div>
        <div class="input-group">
            <label>기타 요청사항</label>
            <textarea id="notes" rows="2" placeholder="예: 노약자 동행, 짐이 많음"></textarea>
        </div>
        <button type="submit" class="submit-btn">안심동행 신청하기</button>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    // 사용자의 Firebase 설정값 (ansim-doghaeng 프로젝트)
    const firebaseConfig = {
        apiKey: "AIzaSyC4pyfcbxQu7ggpju9pAn-bJiRMDVKsRrc",
        authDomain: "ansim-doghaeng.firebaseapp.com",
        projectId: "ansim-doghaeng",
        storageBucket: "ansim-doghaeng.firebasestorage.app",
        messagingSenderId: "969921301114",
        appId: "1:969921301114:web:210c4a8978a3b2204f89c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 데이터 저장 로직
    document.getElementById('reservationForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const submitBtn = e.target.querySelector('.submit-btn');
        submitBtn.disabled = true;
        submitBtn.innerText = "접수 중...";

        try {
            // admin.html과 일치하도록 "requests" 컬렉션 사용
            await addDoc(collection(db, "requests"), {
                startLoc: document.getElementById('startLoc').value,
                endLoc: document.getElementById('endLoc').value,
                contact: document.getElementById('contact').value,
                notes: document.getElementById('notes').value || "요청없음",
                status: "대기",
                createdAt: serverTimestamp()
            });
            
            alert('정상적으로 접수되었습니다. 출발지에서 잠시만 기다려주세요.');
            this.reset();
        } catch (error) {
            console.error("접수 에러:", error);
            alert('접수 중 오류가 발생했습니다. 다시 시도해 주세요.');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "안심동행 신청하기";
        }
    });
</script>
</body>
</html>
