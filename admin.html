<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    // 1. Firebase 설정 (중복 제거, 한 번만 선언)
    const firebaseConfig = {
        apiKey: "AIzaSyC4pyfcbxQu7ggpju9pAn-bJiRMDVKsRrc",
        authDomain: "ansim-doghaeng.firebaseapp.com",
        projectId: "ansim-doghaeng",
        storageBucket: "ansim-doghaeng.firebasestorage.app",
        messagingSenderId: "969921301114",
        appId: "1:969921301114:web:210c4a8978a3b2204f89c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // 2. 알림 설정 (소리 및 권한)
    const alertSound = new Audio('https://t1.daumcdn.net/kakaotalk/public/sound/talk_01.mp3');
    let canPlayAudio = false;

    // 화면 클릭 시 소리 권한 획득
    window.enableAudio = () => {
        canPlayAudio = true;
        console.log("알림음 활성화 상태");
    };

    // 브라우저 팝업 권한 요청
    if (Notification.permission !== 'granted') {
        Notification.requestPermission();
    }

    // 3. 실시간 데이터 감시 (컬렉션 이름: requests)
    const q = query(collection(db, "requests"), orderBy("createdAt", "desc"));
    
    onSnapshot(q, (snapshot) => {
        const queueList = document.getElementById('queueList');
        const countBadge = document.getElementById('countBadge');
        queueList.innerHTML = "";
        let count = 0;

        // [핵심] 신규 접수 알림 로직
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
                const item = change.doc.data();
                const now = new Date().getTime();
                const itemTime = item.createdAt ? item.createdAt.toDate().getTime() : now;
                
                // 최근 10초 이내에 생성된 데이터일 때만 알림 실행
                if (now - itemTime < 10000) {
                    if (canPlayAudio) {
                        alertSound.play().catch(e => console.log("소리 재생 실패:", e));
                    }
                    if (Notification.permission === 'granted') {
                        new Notification("🚓 안심동행 신규 접수!", {
                            body: `${item.startLoc}에서 요청이 들어왔습니다.`,
                            icon: "https://rlaqhgus3959-bit.github.io/home/icon-192x192.png"
                        });
                    }
                }
            }
        });

        // 목록 화면 업데이트
        snapshot.forEach((d) => {
            const item = d.data();
            if(item.status === "완료") return;
            
            count++;
            const time = item.createdAt ? item.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "접수 중";
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="info">
                    <div class="loc">${item.startLoc} ⇨ ${item.endLoc} <span class="tag">${item.notes || '없음'}</span></div>
                    <div class="detail">${item.contact} | 접수: ${time}</div>
                </div>
                <button class="action-btn" onclick="done('${d.id}')">완료</button>
            `;
            queueList.appendChild(card);
        });
        countBadge.innerText = `대기 ${count}건`;
    });

    // 완료 처리 함수
    window.done = async (id) => {
        if(confirm("지원을 완료하셨습니까?")) {
            await updateDoc(doc(db, "requests", id), { status: "완료" });
        }
    };
</script>
