<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    const firebaseConfig = { /* 위와 동일한 설정값 */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const ansimCollection = collection(db, "ansim_requests");

    // 실시간 데이터 수신 (대기 상태인 건만 시간순 정렬)
    const q = query(ansimCollection, orderBy("createdAt", "desc"));
    
    onSnapshot(q, (snapshot) => {
        const queueList = document.getElementById('queueList');
        const countBadge = document.getElementById('countBadge');
        queueList.innerHTML = "";
        let count = 0;

        snapshot.forEach((doc) => {
            const item = doc.data();
            if(item.status === "완료") return; // 완료된 건은 표시 안함
            
            count++;
            const time = item.createdAt ? item.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "접수 중";
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="info">
                    <div class="loc">${item.startLoc} ⇨ ${item.endLoc} <span class="tag">${item.notes}</span></div>
                    <div class="detail">${item.contact} | 접수: ${time}</div>
                </div>
                <button class="action-btn" onclick="completeTask('${doc.id}')">완료</button>
            `;
            queueList.appendChild(card);
        });
        countBadge.innerText = `대기 ${count}건`;
    });

    // 완료 처리 함수
    window.completeTask = async (id) => {
        if(confirm("지원을 완료하셨습니까?")) {
            await updateDoc(doc(db, "ansim_requests", id), { status: "완료" });
        }
    };
</script>
