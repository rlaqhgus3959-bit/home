<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안심동행 관제(경찰용)</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1c1c1e">

    <style>
        body { font-family: -apple-system, sans-serif; background: #1c1c1e; padding: 20px; margin: 0; color: white; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #38383a; padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 20px; color: #0a84ff; }
        .badge { background: #ff453a; padding: 5px 10px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        .card { background: #2c2c2e; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3a3a3c; }
        .info .loc { font-size: 16px; font-weight: bold; color: white; margin-bottom: 5px; }
        .info .detail { font-size: 13px; color: #8e8e93; }
        .action-btn { background: #32d74b; color: #1c1c1e; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>🚓 안심동행 현황판</h2>
        <span class="badge" id="countBadge">대기 2건</span>
    </div>
    
    <div id="queueList">
        <div class="card" id="card1">
            <div class="info">
                <div class="loc">정문 ⇨ 101동 502호</div>
                <div class="detail">010-1234-5678 | 접수 15:30</div>
            </div>
            <button class="action-btn" onclick="completeTask('card1')">완료</button>
        </div>

        <div class="card" id="card2">
            <div class="info">
                <div class="loc">지하주차장 ⇨ 105동 1104호</div>
                <div class="detail">010-9876-5432 | 접수 15:32</div>
            </div>
            <button class="action-btn" onclick="completeTask('card2')">완료</button>
        </div>
    </div>
</div>

<script>
    // 서비스 워커 등록
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        });
    }

    // 완료 처리 함수
    function completeTask(cardId) {
        if(confirm("안심귀가 지원을 완료하셨습니까?")) {
            const element = document.getElementById(cardId);
            if(element) element.style.display = 'none';
        }
    }
</script>
</body>
</html>
