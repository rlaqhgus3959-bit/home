<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안심동행 관제(경찰용)</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1c1c1e; padding: 20px; margin: 0; color: white; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #38383a; padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 20px; color: #0a84ff; }
        .badge { background: #ff453a; padding: 5px 12px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        
        #pushInitBtn { width: 100%; padding: 15px; background: #007aff; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; margin-bottom: 15px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        .toast { position: fixed; top: 18px; left: 50%; transform: translateX(-50%); background: #ff453a; color: white; padding: 15px 20px; border-radius: 16px; font-weight: bold; z-index: 9999; display: none; max-width: 90%; text-align: center; font-size: 16px; line-height: 1.4; box-shadow: 0 8px 25px rgba(0,0,0,0.35); }
        .card { background: #2c2c2e; padding: 18px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3a3a3c; }
        .info .loc { font-size: 17px; font-weight: bold; color: white; margin-bottom: 6px; }
        .info .detail { font-size: 14px; color: #8e8e93; }
        .tag { font-size: 11px; background: #007aff; padding: 2px 6px; border-radius: 4px; color: white; margin-left: 5px; }
        .action-btn { background: #32d74b; color: #000; border: none; padding: 12px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="container">
    <div class="header">
        <h2>🚓 안심동행 현황</h2>
        <span class="badge" id="countBadge">대기 0건</span>
    </div>
    
    <button id="pushInitBtn">📲 푸시 알림 연결하기 (여기를 눌러주세요)</button>

    <div id="queueList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, updateDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-messaging.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4pyfcbxQu7ggpju9pAn-bJiRMDVKsRrc",
        authDomain: "ansim-doghaeng.firebaseapp.com",
        projectId: "ansim-doghaeng",
        storageBucket: "ansim-doghaeng.firebasestorage.app",
        messagingSenderId: "969921301114",
        appId: "1:969921301114:web:210c4a8978a3b2204f89c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messaging = getMessaging(app);
    const alertSound = new Audio("https://t1.daumcdn.net/kakaotalk/public/sound/talk_01.mp3");

    function showToast(message) {
        const toast = document.getElementById("toast");
        toast.innerHTML = message;
        toast.style.display = "block";
        setTimeout(() => { toast.style.display = "none"; }, 5000);
    }

    // ==============================================
    // [핵심] 푸시 알림 등록 및 토큰 발급
    // ==============================================
    const pushInitBtn = document.getElementById('pushInitBtn');
    pushInitBtn.addEventListener('click', async () => {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                
                // 알려주신 VAPID Key 적용 완료!
                const vapidKey = "BAcXnvQfAiHdKSaHw3oMk3RHPHWPmj_CYIadj0dbaPVmhx-mYlOvBdasen6h7K8_DwSeF3lYlRWvJ9f3OZmEaoQ";
                
                const currentToken = await getToken(messaging, { vapidKey: vapidKey });

                if (currentToken) {
                    console.log("발급된 푸시 토큰:", currentToken);
                    
                    await setDoc(doc(db, "admin_tokens", "my_admin_device"), {
                        token: currentToken,
                        updatedAt: new Date()
                    });

                    pushInitBtn.innerText = "✅ 푸시 알림 서버 연결 완료";
                    pushInitBtn.style.background = "#32d74b";
                    pushInitBtn.style.color = "black";
                    alert("성공적으로 서버에 등록되었습니다! 이제 화면이 꺼져도 알림이 올 수 있도록 준비되었습니다.");
                } else {
                    alert("토큰 발급 실패. 브라우저 설정을 확인해주세요.");
                }
            } else {
                alert("알림 권한이 허용되지 않았습니다.");
            }
        } catch (error) {
            console.error("푸시 연결 에러:", error);
            alert("푸시 연결 중 오류가 발생했습니다.");
        }
    });

    onMessage(messaging, (payload) => {
        console.log("화면 켜짐 상태에서 알림 수신: ", payload);
        alertSound.currentTime = 0;
        alertSound.play().catch(e => console.log("소리 재생 실패"));
        showToast(`🚨 ${payload.notification.title}<br>${payload.notification.body}`);
    });

    const q = query(collection(db, "requests"), orderBy("createdAt", "desc"));
    
    onSnapshot(q, (snapshot) => {
        const queueList = document.getElementById('queueList');
        const countBadge = document.getElementById('countBadge');
        queueList.innerHTML = "";
        let count = 0;

        snapshot.forEach((d) => {
            const item = d.data();
            if(item.status === "완료") return;
            
            count++;
            const time = item.createdAt ? item.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "접수 중";
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="info">
                    <div class="loc">${item.startLoc} ⇨ ${item.endLoc} <span class="tag">${item.notes || '기본'}</span></div>
                    <div class="detail">${item.contact} | 접수: ${time}</div>
                </div>
                <button class="action-btn" onclick="done('${d.id}')">완료</button>
            `;
            queueList.appendChild(card);
        });
        countBadge.innerText = `대기 ${count}건`;
    });

    window.done = async (id) => {
        if(confirm("지원을 완료하셨습니까?")) {
            await updateDoc(doc(db, "requests", id), { status: "완료" });
        }
    };
</script>
</body>
</html>
