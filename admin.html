<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안심동행 관제(경찰용)</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1c1c1e; padding: 20px; margin: 0; color: white; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #38383a; padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 20px; color: #0a84ff; }
        .badge { background: #ff453a; padding: 5px 12px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        
        /* 알림 켜기 버튼 스타일 */
        #soundInitBtn { width: 100%; padding: 15px; background: #ff9500; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; margin-bottom: 15px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        .card { background: #2c2c2e; padding: 18px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3a3a3c; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .info .loc { font-size: 17px; font-weight: bold; color: white; margin-bottom: 6px; }
        .info .detail { font-size: 14px; color: #8e8e93; }
        .tag { font-size: 11px; background: #007aff; padding: 2px 6px; border-radius: 4px; color: white; margin-left: 5px; vertical-align: middle; }
        .action-btn { background: #32d74b; color: #000; border: none; padding: 12px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>🚓 안심동행 현황</h2>
        <span class="badge" id="countBadge">대기 0건</span>
    </div>
    
    <!-- 근무 시작 시 이 버튼을 눌러야 소리가 납니다 -->
    <button id="soundInitBtn">🔔 1. 여기를 눌러 알림 소리를 켜주세요</button>

    <div id="queueList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyC4pyfcbxQu7ggpju9pAn-bJiRMDVKsRrc",
        authDomain: "ansim-doghaeng.firebaseapp.com",
        projectId: "ansim-doghaeng",
        storageBucket: "ansim-doghaeng.firebasestorage.app",
        messagingSenderId: "969921301114",
        appId: "1:969921301114:web:210c4a8978a3b2204f89c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const alertSound = new Audio('https://t1.daumcdn.net/kakaotalk/public/sound/talk_01.mp3');

    // [핵심] 버튼 클릭 시 소리 강제 해제
    const soundInitBtn = document.getElementById('soundInitBtn');
    soundInitBtn.addEventListener('click', () => {
        alertSound.play().then(() => {
            // 소리가 성공적으로 나면 버튼을 초록색으로 바꿈
            soundInitBtn.innerText = "✅ 알림 소리 켜짐 (작동 준비 완료)";
            soundInitBtn.style.background = "#32d74b";
            soundInitBtn.style.color = "black";
        }).catch(err => {
            alert("소리 재생 권한을 얻지 못했습니다. 브라우저 설정을 확인해주세요.");
        });

        // 팝업 권한 같이 요청
        if ("Notification" in window && Notification.permission !== 'granted') {
            Notification.requestPermission();
        }
    });

    // 실시간 데이터 감시
    const q = query(collection(db, "requests"), orderBy("createdAt", "desc"));
    
    onSnapshot(q, (snapshot) => {
        const queueList = document.getElementById('queueList');
        const countBadge = document.getElementById('countBadge');
        queueList.innerHTML = "";
        let count = 0;

        snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
                const item = change.doc.data();
                
                let isNewRequest = false;
                if (!item.createdAt) {
                    isNewRequest = true; 
                } else {
                    const now = new Date().getTime();
                    const itemTime = item.createdAt.toDate().getTime();
                    if (now - itemTime < 15000) isNewRequest = true;
                }
                
                // 신규 접수일 때 소리/팝업 실행
                if (isNewRequest) {
                    alertSound.play().catch(e => console.log("소리 재생 실패"));
                    
                    if ("Notification" in window && Notification.permission === 'granted') {
                        new Notification("🚓 안심동행 신규 접수!", {
                            body: `${item.startLoc}에서 신청이 들어왔습니다.`
                        });
                    }
                }
            }
        });

        snapshot.forEach((d) => {
            const item = d.data();
            if(item.status === "완료") return;
            
            count++;
            const time = item.createdAt ? item.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "접수 중";
            
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="info">
                    <div class="loc">${item.startLoc} ⇨ ${item.endLoc} <span class="tag">${item.notes || '기본'}</span></div>
                    <div class="detail">${item.contact} | 접수: ${time}</div>
                </div>
                <button class="action-btn" onclick="done('${d.id}')">완료</button>
            `;
            queueList.appendChild(card);
        });
        countBadge.innerText = `대기 ${count}건`;
    });

    window.done = async (id) => {
        if(confirm("지원을 완료하셨습니까?")) {
            await updateDoc(doc(db, "requests", id), { status: "완료" });
        }
    };
</script>
</body>
</html>
