<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>안심동행 관제(경찰용)</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #1c1c1e;
            padding: 20px;
            margin: 0;
            color: white;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #38383a;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header h2 {
            margin: 0;
            font-size: 20px;
            color: #0a84ff;
        }

        .badge {
            background: #ff453a;
            padding: 5px 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 14px;
        }

        .card {
            background: #2c2c2e;
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #3a3a3c;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info .loc {
            font-size: 17px;
            font-weight: bold;
            color: white;
            margin-bottom: 6px;
        }

        .info .detail {
            font-size: 14px;
            color: #8e8e93;
        }

        .tag {
            font-size: 11px;
            background: #007aff;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            margin-left: 5px;
            vertical-align: middle;
        }

        .action-btn {
            background: #32d74b;
            color: #000;
            border: none;
            padding: 12px 18px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff453a;
            color: white;
            padding: 15px 20px;
            border-radius: 16px;
            font-weight: bold;
            z-index: 9999;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
            display: none;
            max-width: 90%;
            text-align: center;
            font-size: 16px;
            line-height: 1.4;
        }

        .notice {
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            color: #c7c7cc;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .notice strong {
            color: #ffffff;
        }
    </style>
</head>

<body>

<div id="toast" class="toast"></div>

<div class="container">

    <div class="header">
        <h2>🚓 안심동행 현황</h2>
        <span class="badge" id="countBadge">대기 0건</span>
    </div>

    <div class="notice">
        <strong>알림 안내</strong><br>
        관제화면을 처음 연 뒤 화면을 한 번 터치하면 신규 접수 시 알림음이 정상 작동합니다.
    </div>

    <div id="queueList"></div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";

    import {
        getFirestore,
        collection,
        query,
        orderBy,
        onSnapshot,
        updateDoc,
        doc
    } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyC4pyfcbxQu7ggpju9pAn-bJiRMDVKsRrc",
        authDomain: "ansim-doghaeng.firebaseapp.com",
        projectId: "ansim-doghaeng",
        storageBucket: "ansim-doghaeng.firebasestorage.app",
        messagingSenderId: "969921301114",
        appId: "1:969921301114:web:210c4a8978a3b2204f89c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 알림음
    const alertSound = new Audio("https://t1.daumcdn.net/kakaotalk/public/sound/talk_01.mp3");
    alertSound.preload = "auto";

    let audioUnlocked = false;
    let firstLoad = true;

    // 화면 내부 팝업 표시
    function showToast(message) {
        const toast = document.getElementById("toast");

        toast.innerHTML = message;
        toast.style.display = "block";

        setTimeout(() => {
            toast.style.display = "none";
        }, 5000);
    }

    // 소리 권한 해제
    function unlockAudio() {
        alertSound.play()
            .then(() => {
                alertSound.pause();
                alertSound.currentTime = 0;
                audioUnlocked = true;
                console.log("알림음 활성화 완료");
                showToast("🔊 알림음이 활성화되었습니다.");
            })
            .catch(() => {
                console.log("알림음 활성화 대기 중");
            });
    }

    // 모바일/PC 최초 1회 터치 또는 클릭 시 알림음 활성화
    document.addEventListener("click", unlockAudio, { once: true });
    document.addEventListener("touchstart", unlockAudio, { once: true });

    // 브라우저 알림 권한 요청
    if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission().then((permission) => {
            console.log("알림 권한:", permission);
        });
    }

    // 신규 접수 알림 실행
    function notifyNewRequest(item) {
        const startLoc = item.startLoc || "출발지 미입력";
        const endLoc = item.endLoc || "도착지 미입력";
        const contact = item.contact || "연락처 없음";

        const title = "🚓 안심동행 신규 접수";
        const body = `${startLoc} → ${endLoc} / ${contact}`;

        // 화면 상단 팝업
        showToast(`
            🚨 신규 접수<br>
            ${startLoc} → ${endLoc}
        `);

        // 진동
        if (navigator.vibrate) {
            navigator.vibrate([300, 150, 300]);
        }

        // 알림음
        alertSound.currentTime = 0;
        alertSound.play().catch(() => {
            console.log("소리 재생 실패: 화면을 한 번 터치해야 할 수 있습니다.");
        });

        // 브라우저 알림
        if ("Notification" in window && Notification.permission === "granted") {
            new Notification(title, {
                body: body,
                icon: "https://cdn-icons-png.flaticon.com/512/3063/3063822.png",
                badge: "https://cdn-icons-png.flaticon.com/512/3063/3063822.png"
            });
        }
    }

    // Firestore 실시간 감시
    const q = query(
        collection(db, "requests"),
        orderBy("createdAt", "desc")
    );

    onSnapshot(q, (snapshot) => {
        const queueList = document.getElementById("queueList");
        const countBadge = document.getElementById("countBadge");

        queueList.innerHTML = "";

        let count = 0;

        // 신규 접수 감지
        snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
                const item = change.doc.data();

                // 처음 화면을 켰을 때 기존 접수건이 전부 알림 울리는 문제 방지
                if (firstLoad) {
                    return;
                }

                let isNewRequest = false;

                if (!item.createdAt) {
                    isNewRequest = true;
                } else {
                    const now = new Date().getTime();
                    const itemTime = item.createdAt.toDate().getTime();

                    // 최근 15초 이내 생성된 접수만 신규 알림 처리
                    if (now - itemTime < 15000) {
                        isNewRequest = true;
                    }
                }

                if (isNewRequest && item.status !== "완료") {
                    notifyNewRequest(item);
                }
            }
        });

        // 목록 화면 표시
        snapshot.forEach((d) => {
            const item = d.data();

            if (item.status === "완료") {
                return;
            }

            count++;

            const startLoc = item.startLoc || "출발지 미입력";
            const endLoc = item.endLoc || "도착지 미입력";
            const notes = item.notes || "기본";
            const contact = item.contact || "연락처 없음";

            const time = item.createdAt
                ? item.createdAt.toDate().toLocaleTimeString([], {
                    hour: "2-digit",
                    minute: "2-digit"
                })
                : "접수 중";

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <div class="info">
                    <div class="loc">
                        ${startLoc} ⇨ ${endLoc}
                        <span class="tag">${notes}</span>
                    </div>
                    <div class="detail">
                        ${contact} | 접수: ${time}
                    </div>
                </div>

                <button class="action-btn" onclick="done('${d.id}')">
                    완료
                </button>
            `;

            queueList.appendChild(card);
        });

        countBadge.innerText = `대기 ${count}건`;

        // 최초 로딩 완료 처리
        firstLoad = false;
    });

    // 완료 처리
    window.done = async (id) => {
        if (confirm("지원을 완료하셨습니까?")) {
            await updateDoc(doc(db, "requests", id), {
                status: "완료"
            });
        }
    };
</script>

</body>
</html>
