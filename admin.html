<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>안심동행 관제(경찰용)</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #1c1c1e; padding: 20px; margin: 0; color: white; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #38383a; padding-bottom: 15px; margin-bottom: 20px; }
        .header h2 { margin: 0; font-size: 20px; color: #0a84ff; }
        .badge { background: #ff453a; padding: 5px 12px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        .card { background: #2c2c2e; padding: 18px; border-radius: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #3a3a3c; }
        .info .loc { font-size: 17px; font-weight: bold; color: white; margin-bottom: 6px; }
        .info .detail { font-size: 14px; color: #8e8e93; }
        .tag { font-size: 11px; background: #007aff; padding: 2px 6px; border-radius: 4px; color: white; margin-left: 5px; }
        .action-btn { background: #32d74b; color: #000; border: none; padding: 12px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2>🚓 안심동행 현황</h2>
        <span class="badge" id="countBadge">대기 0건</span>
    </div>
    <div id="queueList"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getFirestore, collection, query, orderBy, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC4pyfcbxQu7ggpju9pAn-bJiRMDVKsRrc",
        authDomain: "ansim-doghaeng.firebaseapp.com",
        projectId: "ansim-doghaeng",
        storageBucket: "ansim-doghaeng.firebasestorage.app",
        messagingSenderId: "969921301114",
        appId: "1:969921301114:web:210c4a8978a3b2204f89c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const q = query(collection(db, "requests"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        const queueList = document.getElementById('queueList');
        const countBadge = document.getElementById('countBadge');
        queueList.innerHTML = "";
        let count = 0;

        snapshot.forEach((d) => {
            const item = d.data();
            if(item.status === "완료") return;
            count++;
            const time = item.createdAt ? item.createdAt.toDate().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "...";
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="info">
                    <div class="loc">${item.startLoc} ⇨ ${item.endLoc} <span class="tag">${item.notes}</span></div>
                    <div class="detail">${item.contact} | 접수: ${time}</div>
                </div>
                <button class="action-btn" onclick="done('${d.id}')">완료</button>
            `;
            queueList.appendChild(card);
        });
        countBadge.innerText = `대기 ${count}건`;
    });

    window.done = async (id) => {
        if(confirm("지원을 완료하셨습니까?")) {
            await updateDoc(doc(db, "requests", id), { status: "완료" });
        }
    };
</script>
</body>
</html>
